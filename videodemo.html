<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Tacit — Product Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --ink:#18232E; --pulse:#1A9E78; --pulse-10:#E8F7F2; --pulse-70:#0F6E56;
  --sand:#F4EFE6; --mist:#8A9BA8; --ink-10:#E8EDF0; --ink-60:#4A6070;
  --serif:'Instrument Serif',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif;
}
body{
  font-family:var(--sans); background:var(--ink); color:var(--sand);
  font-weight:300; min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
}
.logo{ display:flex; align-items:center; gap:10px; margin-bottom:40px; }
.logo span{ font-family:var(--serif); font-size:24px; color:var(--sand); letter-spacing:-.02em; }
.wrap{ max-width:580px; width:100%; text-align:center; }
h1{
  font-family:var(--serif); font-size:clamp(32px,5vw,46px); font-weight:400;
  line-height:1.1; letter-spacing:-.02em; color:var(--sand);
}
h1 em{ color:var(--pulse); font-style:italic; }
p.tag{ font-size:15px; color:var(--mist); margin-top:14px; margin-bottom:40px; }
button{
  font-family:var(--sans); cursor:pointer; border:none;
  background:var(--pulse); color:white; border-radius:10px;
  padding:16px 36px; font-size:15px; font-weight:500;
  transition:background 200ms ease, transform 200ms ease;
}
button:hover{ background:var(--pulse-70); transform:translateY(-1px); }
.foot{ margin-top:56px; font-size:12px; color:var(--mist); letter-spacing:.04em; }
</style>
</head>
<body>

  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 100 100" aria-hidden="true">
      <line x1="50" y1="84" x2="50" y2="48" stroke="#1A9E78" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="50" y1="48" x2="20" y2="18" stroke="#1A9E78" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="50" y1="48" x2="80" y2="18" stroke="#1A9E78" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="8"  y1="18" x2="32" y2="18" stroke="#1A9E78" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="68" y1="18" x2="92" y2="18" stroke="#1A9E78" stroke-width="2.8" stroke-linecap="round"/>
    </svg>
    <span>Tacit</span>
  </div>

  <div class="wrap">
    <h1>See Tacit <em>in action</em></h1>
    <p class="tag">The knowledge behind the work.</p>
    <button onclick="Supademo.open('cmqh8qvma0w60qmz3rkjdstsq')">Try the tour</button>
  </div>

  <p class="foot">tacit.guru</p>

  <script src="https://script.supademo.com/supademo.js"></script>
</body>
</html>
